<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Event Calendar</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    min-height:100vh;
    background: linear-gradient(135deg, #ffffff, #d9ecff, #4f9cff);
}

/* ---------- NAVBAR ---------- */
.top-nav{
    height: 75px;
    background: #0b2a5b;
    display: flex;
    align-items: center;
    padding: 0 25px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

.back-btn{
    padding: 10px 18px;
    background: #1e5eff;
    border-radius: 12px;
    text-decoration: none;
    color: #fff;
    font-size: 14px;
    font-weight: bold;
    transition: 0.3s;
}

.back-btn:hover{
    background: #3b77ff;
    transform: translateY(-2px);
}

/* ---------- TITLE ---------- */
.calendar-title{
    text-align:center;
    font-size: 28px;
    margin: 30px 0;
    font-weight: bold;
    color: #0b2a5b;
    background: rgba(255,255,255,0.6);
    width: fit-content;
    margin-left:auto;
    margin-right:auto;
    padding:10px 25px;
    border-radius:15px;
    border:1px solid rgba(0,0,0,0.1);
}

/* ---------- GRID ---------- */
.calendar-container{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
    padding: 0 40px 40px;
    max-width:1200px;
    margin:auto;
}

/* ---------- CARD ---------- */
.calendar-card{
    background: linear-gradient(145deg, #ffffff, #cfe6ff);
    border-radius: 18px;
    overflow: hidden;

    border: 1px solid rgba(0,0,0,0.08);

    box-shadow: 0 6px 15px rgba(0,0,0,0.12);

    transition: 0.35s ease;

    display:flex;
    flex-direction:column;
}

/* HOVER MOVEMENT */
.calendar-card:hover{
    transform: translateY(-10px);
    box-shadow: 0 18px 35px rgba(0,0,0,0.25);
}

/* IMAGE */
.calendar-img{
    height: 200px;
    width: 100%;
    object-fit: cover;
    border-bottom: 1px solid rgba(0,0,0,0.08);
}

/* CONTENT */
.calendar-info{
    padding: 15px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

/* EVENT NAME */
.event-name{
    text-align:center;
    font-weight:bold;
    font-size:16px;
    color:#0b2a5b;
}

/* DATE BOXES */
.calendar-date,
.calendar-end{
    padding:10px;
    border-radius:12px;
    text-align:center;
    font-size:13px;
    font-weight:bold;
    color:white;
}

/* COLORS */
.calendar-date{
    background: #1e5eff;
}

.calendar-end{
    background: #0b2a5b;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="top-nav">
    <a class="back-btn" href="Homepage.html">⬅ Back</a>
</div>

<!-- TITLE -->
<div class="calendar-title">Event Calendar</div>

<!-- CARDS -->
<div class="calendar-container">

    <div class="calendar-card">
        <img src="Volleyball.jpg" class="calendar-img">
        <div class="calendar-info">
            <div class="event-name">Volleyball</div>
            <div class="calendar-date">Start: Jan 28, 2026</div>
            <div class="calendar-end">End: Jan 30, 2026</div>
        </div>
    </div>

    <div class="calendar-card">
        <img src="seminar.jpg" class="calendar-img">
        <div class="calendar-info">
            <div class="event-name">Seminar</div>
            <div class="calendar-date">Start: Mar 27, 2026</div>
            <div class="calendar-end">End: Mar 28, 2026</div>
        </div>
    </div>

    <div class="calendar-card">
        <img src="acquantance party.jpg" class="calendar-img">
        <div class="calendar-info">
            <div class="event-name">Acquaintance Party</div>
            <div class="calendar-date">Start: Sep 25, 2026</div>
            <div class="calendar-end">End: Sep 26, 2026</div>
        </div>
    </div>

    <div class="calendar-card">
        <img src="culture night.jpg" class="calendar-img">
        <div class="calendar-info">
            <div class="event-name">Culture Night</div>
            <div class="calendar-date">Start: Feb 10, 2026</div>
            <div class="calendar-end">End: Feb 11, 2026</div>
        </div>
    </div>

</div>

</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Event Attendance Sheet</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
}

.container{
    width:90%;
    max-width:1200px;
    margin:30px auto;
    background:#1e293b;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:#ffffff;
}

.top-row{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

.left-meta{
    flex:1;
}

.meta-line{
    margin-bottom:15px;
}

.meta-line label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

.line{
    background:#334155;
    padding:10px;
    border-radius:10px;
    min-height:20px;
}

.right-meta{
    width:200px;
    background:#334155;
    padding:15px;
    border-radius:15px;
}

.meta-item{
    margin-bottom:10px;
}

.attendance-table{
    width:100%;
    border-collapse:collapse;
    overflow:hidden;
    border-radius:15px;
}

.attendance-table th{
    background:#2563eb;
    padding:15px;
    border:1px solid #1e40af;
}

.attendance-table td{
    padding:12px;
    border:1px solid #334155;
    background:#1e293b;
}

.attendance-table tr:nth-child(even) td{
    background:#243447;
}

td[contenteditable]{
    outline:none;
}

.controls{
    margin-top:20px;
    display:flex;
    gap:10px;
    justify-content:flex-end;
}

.btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:10px;
    cursor:pointer;
    text-decoration:none;
    font-weight:bold;
}

.btn:hover{
    background:#1d4ed8;
}

</style>
</head>

<body>

<div class="container">

<h1>EVENT ATTENDANCE SHEET</h1>

<div class="top-row">

<div class="left-meta">

<div class="meta-line">
<label>Event Title</label>
<div class="line" contenteditable></div>
</div>

<div class="meta-line">
<label>Location</label>
<div class="line" contenteditable></div>
</div>

</div>

<div class="right-meta">
<div class="meta-item">Date</div>
<div class="line" contenteditable></div>

<div class="meta-item">Time</div>
<div class="line" contenteditable></div>
</div>

</div>

<table class="attendance-table">

<thead>
<tr>
<th>NAME</th>
<th>ID NUMBER</th>
<th>BIRTHDATE</th>
<th>EMAIL</th>
</tr>
</thead>

<tbody>

<tr><td contenteditable></td><td contenteditable></td><td contenteditable></td><td contenteditable></td></tr>
<tr><td contenteditable></td><td contenteditable></td><td contenteditable></td><td contenteditable></td></tr>
<tr><td contenteditable></td><td contenteditable></td><td contenteditable></td><td contenteditable></td></tr>
<tr><td contenteditable></td><td contenteditable></td><td contenteditable></td><td contenteditable></td></tr>
<tr><td contenteditable></td><td contenteditable></td><td contenteditable></td><td contenteditable></td></tr>

</tbody>

</table>

<div class="controls">
<button class="btn" onclick="saveAttendance()">Save</button>
<button class="btn" onclick="clearAttendance()">Clear</button>
<a href="Homepage.html" class="btn">Back</a>
</div>

</div>

<script src="script.js"></script>

</body>
</html>

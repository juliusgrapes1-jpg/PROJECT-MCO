<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #230dcc;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 80%;
    max-width: 600px;
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #5f93b4;
}

.btn {
    width: 100%;
    padding: 12px;
    background: #163c7a;
    color: white;
    border: none;
    border-radius: 20px;
    margin-top: 10px;
    cursor: pointer;
}

.btn:hover {
    background: #0f2f5f;
}

.success {
    display: none;
    margin-top: 10px;
    color: green;
}
</style>
</head>

<body>

<div class="container">

    <h2>REGISTER</h2>

    <!-- REQUIRED FIELDS -->
    <input type="date" id="birthdate" placeholder="Birthdate">
    <input type="text" id="idnum" placeholder="ID Number">
    <input type="email" id="email" placeholder="Email">

    <button class="btn" onclick="registerUser()">Register</button>

    <div class="success" id="successBox">Registered Successfully!</div>

    <a href="index.html">Already have account? Login</a>

</div>

<script src="script.js"></script>

</body>
</html>
